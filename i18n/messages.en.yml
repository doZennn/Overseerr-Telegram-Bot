en:
  # Generic nav/confirmation button labels
  cancel_btn: ❌ Cancel
  back_btn: ⬅️ Back
  more_btn: ➡️ More

  system_online: |
    🤖 *System Online*
    Overseerr Bot v%{version} is up and running!

  version_available: 🔔 New version (%{version}) available!
  welcome_message: |
    👋 *Welcome to the Overseerr Telegram Bot!* v%{current_version}%{newer_version}
    
